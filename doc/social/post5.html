<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1080px; overflow: hidden; background: #000; }
body { font-family: 'Futura', 'Helvetica Neue', Arial, sans-serif; }
.container {
  width: 1080px; height: 1080px;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; justify-content: flex-end;
}
.bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  object-fit: cover;
}
.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.05) 25%, rgba(0,0,0,0.6) 55%, rgba(0,0,0,0.92) 72%, rgba(0,0,0,1) 100%);
}
.top-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 5px;
  background: linear-gradient(90deg, #F26B1D, #FF8C42);
  z-index: 10;
}
.logo-row {
  position: absolute; top: 28px; left: 36px;
  display: flex; align-items: center; gap: 12px;
  z-index: 10;
}
.logo { width: 44px; height: 44px; }
.brand-name { font-size: 20px; letter-spacing: 4px; color: #fff; font-weight: 700; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
.content {
  position: relative; z-index: 5;
  padding: 0 56px 56px;
}
.headline {
  font-size: 44px; font-weight: 900; color: #fff; line-height: 1.1;
  text-transform: uppercase; margin-bottom: 12px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.8);
}
.headline .accent { color: #F26B1D; }
.subtitle {
  font-size: 19px; color: #bbb; line-height: 1.4;
  text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  margin-bottom: 16px;
}
.url { font-size: 18px; color: #F26B1D; letter-spacing: 2px; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <img src="post5-chosen.jpg" class="bg">
  <div class="overlay"></div>
  <div class="top-bar"></div>
  <div class="logo-row">
    <img src="file:///Users/agent/fun/prj/fitness/app/img/logo-hero.png" class="logo">
    <span class="brand-name">ORVYA</span>
  </div>
  <div class="content">
    <div class="headline">Tire uma foto.<br>Receba sua <span class="accent">análise corporal.</span></div>
    <div class="subtitle">Composição corporal, % de gordura e biotipo — tudo com inteligência artificial.</div>
    <div class="url">orvya.app</div>
  </div>
</div>
</body>
</html>
