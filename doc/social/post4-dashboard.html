<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; background: #0A0A0A; font-family: 'Inter', 'Helvetica Neue', sans-serif; overflow: hidden; position: relative; }

/* Subtle radial glow behind phone */
.glow {
    position: absolute;
    width: 600px; height: 600px;
    top: 180px; left: 50%;
    transform: translateX(-50%);
    background: radial-gradient(circle, rgba(242,107,29,0.15) 0%, transparent 70%);
    border-radius: 50%;
    z-index: 0;
}

/* Top section */
.top {
    position: absolute;
    top: 40px; left: 0; right: 0;
    text-align: center;
    z-index: 2;
}
.top h1 {
    font-family: 'Futura', 'Trebuchet MS', sans-serif;
    font-size: 52px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: 2px;
    margin-bottom: 12px;
}
.top h1 span { color: #F26B1D; }
.top p {
    font-size: 26px;
    color: rgba(255,255,255,0.7);
    font-weight: 400;
    line-height: 1.4;
}

/* Phone mockup */
.phone-wrap {
    position: absolute;
    top: 220px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1;
}
.phone-frame {
    width: 320px;
    height: 660px;
    border-radius: 36px;
    border: 3px solid rgba(255,255,255,0.15);
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(242,107,29,0.1);
    position: relative;
}
.phone-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
}

/* Bottom section */
.bottom {
    position: absolute;
    bottom: 45px; left: 0; right: 0;
    text-align: center;
    z-index: 2;
}
.features {
    display: flex;
    justify-content: center;
    gap: 50px;
    margin-bottom: 24px;
}
.feature {
    text-align: center;
}
.feature .icon {
    font-size: 28px;
    margin-bottom: 6px;
}
.feature .label {
    font-size: 17px;
    color: rgba(255,255,255,0.8);
    font-weight: 500;
}
.cta {
    font-family: 'Futura', 'Trebuchet MS', sans-serif;
    font-size: 22px;
    color: #F26B1D;
    font-weight: 700;
    letter-spacing: 1px;
}

/* Logo at bottom-right corner */
.logo {
    position: absolute;
    bottom: 50px;
    right: 50px;
    z-index: 3;
}
.logo img {
    height: 36px;
    opacity: 0.6;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glow"></div>

    <div class="top">
        <h1>TUDO QUE VOCÊ PRECISA<br><span>EM UM SÓ APP</span></h1>
        <p>Nutrição, treino, coach IA e gamificação.</p>
    </div>

    <div class="phone-wrap">
        <div class="phone-frame">
            <img src="dashboard-screenshot.jpg" alt="Orvya Dashboard">
        </div>
    </div>

    <div class="bottom">
        <div class="features">
            <div class="feature">
                <div class="icon">🍽️</div>
                <div class="label">Nutrição</div>
            </div>
            <div class="feature">
                <div class="icon">💪</div>
                <div class="label">Treino</div>
            </div>
            <div class="feature">
                <div class="icon">🤖</div>
                <div class="label">Coach IA</div>
            </div>
            <div class="feature">
                <div class="icon">🏆</div>
                <div class="label">Desafios</div>
            </div>
        </div>
        <div class="cta">orvya.app</div>
    </div>
</body>
</html>
