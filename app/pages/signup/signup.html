<div id="register" class="screen register-screen">
    <div class="register-content">
        <div class="register-header">
            <img src="img/logo-hero.png" alt="Orvya" style="width:64px;height:64px;margin-bottom:8px">
            <h1 style="font-family:'Futura',sans-serif;letter-spacing:2px">Criar Conta</h1>
            <p>Comece sua jornada de evolução</p>
        </div>
        <form ng-submit="register()" class="register-form">
            <div class="form-group">
                <label>Nome completo</label>
                <input type="text" ng-model="reg.name" placeholder="Seu nome" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" ng-model="reg.email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" ng-model="reg.password" placeholder="Mínimo 6 caracteres" required>
            </div>
            <div class="form-group">
                <label>Confirmar senha</label>
                <input type="password" ng-model="reg.confirmPassword" placeholder="Repita a senha" required>
            </div>
            <div class="form-group checkbox-group">
                <label><input type="checkbox" ng-model="reg.terms" required> Aceito os <a href="#" ng-click="openTerms($event)">termos de uso</a></label>
            </div>
            <button type="submit" class="btn btn-primary btn-block" ng-disabled="loading || !reg.terms">
                <span ng-if="!loading">Criar conta</span>
                <span ng-if="loading"><i class="fas fa-spinner fa-spin"></i> Criando...</span>
            </button>
        </form>
        <div class="divider-or"><span>ou</span></div>
        <button class="btn btn-google btn-block" ng-click="signupWithGoogle()" ng-disabled="loading">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            <span>Cadastrar com Google</span>
        </button>
        <div id="google-btn-container-signup" style="display:none"></div>
        <div class="register-footer">
            <p>Já tem conta? <a href="#" ng-click="goTo('login')">Entrar</a></p>
            <p style="margin-top:8px"><a href="#" ng-click="goTo('splash')" style="color:var(--text-muted);font-size:13px">← Voltar</a></p>
        </div>
        <div class="alert alert-error" ng-if="error">{{error}}</div>
        <div class="alert alert-success" ng-if="success">{{success}}</div>
    </div>
</div>
