<div class="upgrade-overlay" ng-show="showUpgradeModal" ng-click="closeUpgradeModal()">
    <div class="upgrade-modal" ng-click="$event.stopPropagation()">
        <button class="upgrade-close" ng-click="closeUpgradeModal()"><i class="fas fa-times"></i></button>
        <div class="upgrade-icon">👑</div>
        <h2 class="upgrade-title">Seja Premium</h2>
        <p class="upgrade-reason">{{upgradeReason}}</p>
        <div class="upgrade-features">
            <div class="upgrade-feature"><i class="fas fa-check"></i> Alterações ilimitadas de planos</div>
            <div class="upgrade-feature"><i class="fas fa-check"></i> Check-ins corporais ilimitados</div>
            <div class="upgrade-feature"><i class="fas fa-check"></i> Análises de laudos ilimitadas</div>
            <div class="upgrade-feature"><i class="fas fa-check"></i> Chat de texto com Coach IA</div>
            <div class="upgrade-feature"><i class="fas fa-check"></i> Ligação por voz com Coach IA</div>
            <div class="upgrade-feature"><i class="fas fa-check"></i> Suporte prioritário</div>
        </div>
        <div class="upgrade-price">
            <span class="upgrade-price-value">R$ 179,90</span>
            <span class="upgrade-price-period">/mês</span>
        </div>
        <button class="btn btn-primary btn-block upgrade-btn" ng-click="upgradeToPremium()">Assinar Premium 👑</button>
        <p class="upgrade-current">Seu plano atual: <strong>Standard</strong> (R$ 29,90/mês)</p>
    </div>
</div>
